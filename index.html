<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- NO CSP meta here — injected by cspInjectPlugin() at build time only -->
    <!-- This keeps the HMR websocket unrestricted during `npm run dev` -->
    <title>Thuisbatterij Calculator</title>
  </head>
  <body>
    <div id="app">
      <div class="container">
        <header role="banner">
          <h1>Thuisbatterij Calculator</h1>
          <p class="tagline">Bereken hoeveel energie een thuisbatterij jouw huis zou besparen.</p>
        </header>
        <main id="drop-zone-region">
          <p class="privacy-promise">
            Je data blijft op je eigen apparaat — open je netwerktabblad en je ziet 0 verzoeken na
            het laden
          </p>
        </main>
        <section id="results-region" aria-label="Vergelijkingsresultaten"></section>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
